services:
  app:
    build:
      context: .
      args:
        DATABASE_URI: ${DATABASE_URI:?Required}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Required}
        REDIS_URL: ${REDIS_URL:-redis://redis:6379}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Required}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Required}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Required}
        MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-false}
        MEILISEARCH_HOST: ${MEILISEARCH_HOST:-http://meilisearch:7700}
        MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-}
    restart: unless-stopped
    env_file: .env
    volumes:
      - mediadata:/app/public/media
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mediadata:
