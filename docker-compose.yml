services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: porosmadura
      POSTGRES_USER: porosmadura
      POSTGRES_PASSWORD: porosmadura
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porosmadura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6385:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    ports:
      - "7705:7700"
    environment:
      MEILI_MASTER_KEY: master-key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        DATABASE_URI: postgres://porosmadura:porosmadura@postgres:5432/porosmadura
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-dummy-build-only}
        REDIS_URL: redis://redis:6379
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3005}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dummy-build-only}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3005}
        MEILISEARCH_ENABLED: ${MEILISEARCH_ENABLED:-true}
        MEILISEARCH_HOST: http://meilisearch:7700
        MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-master-key}
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      DATABASE_URI: postgres://porosmadura:porosmadura@postgres:5432/porosmadura
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-master-key}
      NEXT_PUBLIC_SITE_URL: http://localhost:3005
      BETTER_AUTH_URL: http://localhost:3005
    volumes:
      - mediadata:/app/public/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
  meilidata:
  mediadata:
