services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: porosmadura
      POSTGRES_USER: porosmadura
      POSTGRES_PASSWORD: porosmadura
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porosmadura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6385:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    ports:
      - "7705:7700"
    environment:
      MEILI_MASTER_KEY: master-key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      DATABASE_URI: postgres://porosmadura:porosmadura@postgres:5432/porosmadura
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: master-key
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3005}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-better-auth-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3005}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      CMS_ADMIN_EMAIL: ${CMS_ADMIN_EMAIL:-admin@porosmadura.local}
      CMS_ADMIN_PASSWORD: ${CMS_ADMIN_PASSWORD:-admin12345}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - mediadata:/app/public/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
  meilidata:
  mediadata:
  app_node_modules:
  app_next:
